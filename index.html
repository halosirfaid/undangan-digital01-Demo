function compressImage(file, maxWidth = 800, quality = 0.6) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // Menghasilkan JPEG untuk menghemat ukuran secara drastis
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = error => reject(error);
        };
        reader.onerror = error => reject(error);
    });
}

function getLocalObj(dStr) {
    if (!dStr || dStr === "-") return new Date(NaN);
    let s = dStr.toString();
    if (s.includes(' ') && !s.includes('T')) s = s.replace(' ', 'T');
    return new Date(s);
}

function formatOfficialDate(dateStr) {
    if(!dateStr || dateStr === "-" || dateStr === "") return "-";
    try {
        const d = getLocalObj(dateStr);
        if(isNaN(d.getTime())) return dateStr;
        let h = d.getHours();
        let m = d.getMinutes();
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12;
        h = h ? h : 12; 
        let timeString = h.toString().padStart(2, '0') + '.' + m.toString().padStart(2, '0') + ' ' + ampm;
        return `${DAY_NAMES[d.getDay()]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}, Pukul : ${timeString} WITA`;
    } catch (e) { return dateStr; }
}

function formatSimpleDate(dateStr) {
    if(!dateStr || dateStr === "-" || dateStr === "") return "-";
    try {
        const d = getLocalObj(dateStr);
        if(isNaN(d.getTime())) return dateStr;
        return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
    } catch (e) { return dateStr; }
}

    el.innerText = m; document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

    }
};

async function callGAS(action, data = {}) {
    if(IS_PREVIEW) return { success: true, message: "Preview Mode" };
    try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action, data }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
        if (!res.ok) throw new Error("HTTP Status " + res.status);
        return await res.json();
    } catch (err) { console.warn(err); return { success: false, error: "Koneksi Gagal" }; }
}

        { id: 'perizinan', label: 'Izin', icon: 'users', roles: ['Guru', 'Orangtua', 'Admin'] },
        { id: 'kedatangan', label: 'Datang', icon: 'map-pin', roles: ['Guru', 'Orangtua', 'Admin'] },
        { id: 'sita', label: 'Sita', icon: 'shield-alert', roles: ['Admin'] },
        { id: 'infaq', label: 'Ta\'zir', icon: 'wallet', roles: ['Admin'] },
        { id: 'infaq_umum', label: 'Infaq', icon: 'heart', roles: ['Admin'] }
    ];
    d.innerHTML = ''; m.innerHTML = '';
    const userRole = (currentUser.role || 'Orangtua').trim();
    menus.forEach(item => {
        if (item.roles.includes(userRole)) {
            const bD = document.createElement('button');
            bD.className = 'nav-btn w-full flex items-center gap-3 p-3 rounded-xl font-semibold text-slate-600 hover:bg-yellow-50 text-sm transition-all';
            bD.onclick = () => switchPage(item.id); bD.innerHTML = `<i data-lucide="${item.icon}" class="w-5 h-5"></i><span>${item.label}</span>`;
            bD.id = `nav-d-${item.id}`; d.appendChild(bD);
            const bM = document.createElement('button');
            bM.className = 'flex flex-col items-center gap-1 p-2 text-slate-400 flex-1';
            bM.onclick = () => switchPage(item.id); bM.innerHTML = `<i data-lucide="${item.icon}" class="w-5 h-5"></i><span class="text-[8px] font-bold uppercase">${item.label}</span>`;
            bM.id = `nav-m-${item.id}`; m.appendChild(bM);
        }
    });
    initLucide();
}

function switchPage(pageId) {
    try {
        currentPageId = pageId;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'bg-blue-600', 'text-white'));
        const activeBtn = document.getElementById(`nav-d-${pageId}`);
        if(activeBtn) activeBtn.classList.add('active', 'bg-blue-600', 'text-white');
        
        if (pageId === 'dashboard') renderDashboard();
        else if (pageId === 'perizinan') renderPerizinan();
        else if (pageId === 'kedatangan') renderKedatangan();
        else if (pageId === 'infaq') renderInfaq();
        else if (pageId === 'infaq_umum') renderInfaqUmum();
        else if (pageId === 'sita') renderSita();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch(e) { console.error(e); }
}

function filterStatsTable(val) {
    const rows = document.querySelectorAll('#stat-body tr');
    const lowerVal = val.toLowerCase();
    rows.forEach(row => {
        if(row.cells.length > 1) { 
            const name = row.cells[0].innerText.toLowerCase();
            row.style.display = name.includes(lowerVal) ? '' : 'none';
        }
    });
}

function renderDashboard() {
    const configList = appData.config || [];
    const dorms = ['Semua', ...new Set(configList.filter(c => c && c[0] === 'Asrama').map(c => c[1]))];
    const santriList = appData.santri || [];
    const riwayatList = appData.riwayat || [];
    const kedatanganList = appData.kedatangan || [];
    
    const studentsOutUnique = [...new Set(riwayatList.filter(r => r && r[8] === 'Keluar' && (dashboardFilter.dorm === 'Semua' || r[2] === dashboardFilter.dorm)).map(r => r[1]))];
    const outCount = studentsOutUnique.length;
    const totalSantriFilter = santriList.filter(s => s && (dashboardFilter.dorm === 'Semua' || s[2] === dashboardFilter.dorm)).length;
    const inCount = Math.max(0, totalSantriFilter - outCount);

    const studentStats = {}; const reasonCount = {}; const monthlyData = Array(12).fill(0);
    santriList.filter(s => s && (dashboardFilter.dorm === 'Semua' || s[2] === dashboardFilter.dorm)).forEach(s => { if(s[1]) studentStats[s[1]] = { izin: 0, sakit: 0, terlambat: 0 }; });
    
    riwayatList.forEach(r => { 
        if(!r || r.length < 6) return; const d = getLocalObj(r[5]); if(isNaN(d.getTime())) return;
        const matchMonth = dashboardFilter.month === 'Semua' || (d.getMonth() + 1).toString() === dashboardFilter.month;
        const matchYear = dashboardFilter.year === 'Semua' || d.getFullYear().toString() === dashboardFilter.year;
        if(matchMonth && matchYear && studentStats[r[1]]) {
            if(r[3] === 'Izin') studentStats[r[1]].izin++;
            if(r[3] === 'Sakit') studentStats[r[1]].sakit++;
            reasonCount[r[4]] = (reasonCount[r[4]] || 0) + 1;
        }
    });

    kedatanganList.forEach(k => { 
        if(!k || k.length < 6) return; const d = getLocalObj(k[2]);
        if(!isNaN(d.getTime())) {
            monthlyData[d.getMonth()] += (Number(k[5]) || 0);
            const matchMonth = dashboardFilter.month === 'Semua' || (d.getMonth() + 1).toString() === dashboardFilter.month;
            const matchYear = dashboardFilter.year === 'Semua' || d.getFullYear().toString() === dashboardFilter.year;
            if(matchMonth && matchYear && studentStats[k[1]]) studentStats[k[1]].terlambat += (Number(k[5]) || 0); 
        }
    });

    const statRows = Object.keys(studentStats).map(name => `
        <tr class="border-b hover:bg-slate-50 transition-colors text-xs">
            <td class="p-3 font-bold text-blue-600 cursor-pointer underline decoration-dotted" onclick="openStudentDetail('${name.replace(/'/g, "\\'")}')">${name}</td>
            <td class="p-3 text-center">${studentStats[name].izin}x</td><td class="p-3 text-center">${studentStats[name].sakit}x</td>
            <td class="p-3 text-center font-bold text-red-600">${studentStats[name].terlambat} Hari</td>
        </tr>`).join('');

    document.getElementById('content-area').innerHTML = `
        <div class="flex flex-col md:flex-row justify-between mb-6 gap-3">
            <h2 class="text-lg font-bold">Ringkasan Statistik</h2>
            <div class="flex gap-2 overflow-x-auto pb-2 md:pb-0">
                <select onchange="dashboardFilter.dorm=this.value; renderDashboard()" class="text-[10px] border p-2 rounded-xl bg-white shadow-sm outline-none">${dorms.map(d => `<option value="${d}" ${dashboardFilter.dorm === d ? 'selected' : ''}>Asrama: ${d}</option>`).join('')}</select>
                <select onchange="dashboardFilter.month=this.value; renderDashboard()" class="text-[10px] border p-2 rounded-xl bg-white shadow-sm outline-none"><option value="Semua">Semua Bulan</option>${MONTH_NAMES.map((n,i) => `<option value="${i+1}" ${dashboardFilter.month == (i+1) ? 'selected' : ''}>${n}</option>`).join('')}</select>
                <select onchange="dashboardFilter.year=this.value; renderDashboard()" class="text-[10px] border p-2 rounded-xl bg-white shadow-sm outline-none"><option value="Semua">Semua Tahun</option>${[2024,2025,2026,2027].map(y => `<option value="${y}" ${dashboardFilter.year == y ? 'selected' : ''}>${y}</option>`).join('')}</select>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-emerald-500 p-5 rounded-2xl text-white shadow-lg text-center"><span class="text-[10px] font-bold uppercase opacity-80">Di Pondok</span><div class="text-2xl font-bold">${inCount}</div></div>
            <div class="bg-blue-600 p-5 rounded-2xl text-white shadow-lg text-center"><span class="text-[10px] font-bold uppercase opacity-80">Sedang Luar</span><div class="text-2xl font-bold">${outCount}</div></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border"><h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 text-center">Analisis Alasan Izin</h3><canvas id="reasonChart"></canvas></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border"><h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 text-center">Tren Keterlambatan Keseluruhan</h3><canvas id="lateChart"></canvas></div>
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-sm border">
            <h3 class="text-xs font-bold text-blue-600 uppercase mb-3 text-center font-black">Kuantitas Perizinan</h3>
            <input type="text" placeholder="Ketik nama santri..." oninput="filterStatsTable(this.value)" class="w-full px-4 py-2 border rounded-xl text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <div class="table-responsive max-h-80 overflow-y-auto"><table class="w-full text-left text-xs"><thead class="bg-slate-50 sticky top-0 uppercase font-bold text-slate-400"><tr><th class="p-3">Nama</th><th class="p-3 text-center">Izin</th><th class="p-3 text-center">Sakit</th><th class="p-3 text-center">Terlambat</th></tr></thead><tbody id="stat-body">${statRows || '<tr><td colspan="4" class="p-10 text-center italic text-slate-400">Data Kosong</td></tr>'}</tbody></table></div>
        </div>
    `;
    initLucide(); initCharts(reasonCount, monthlyData);
}

function initCharts(reasonCount, monthlyData) {
    const ctx1 = document.getElementById('reasonChart');
    if(ctx1) {
        if(reasonChartInstance) reasonChartInstance.destroy();
        reasonChartInstance = new Chart(ctx1, { type: 'doughnut', data: { labels: Object.keys(reasonCount), datasets: [{ data: Object.values(reasonCount), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } } });
    }
    const ctx2 = document.getElementById('lateChart');
    if(ctx2) {
        if(lateChartInstance) lateChartInstance.destroy();
        lateChartInstance = new Chart(ctx2, { type: 'bar', data: { labels: MONTH_NAMES, datasets: [{ label: 'Hari Terlambat', data: monthlyData, backgroundColor: '#f59e0b', borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
    }
}

function openStudentDetail(name) {
    const modal = document.getElementById('modal-overlay'), body = document.getElementById('modal-body'), title = document.getElementById('modal-title');
    title.innerText = `Riwayat: ${name}`;

    const isAdmin = currentUser && currentUser.role === 'Admin';

    hist.forEach(r => {
        const dKeluar = getLocalObj(r[5]);
        const matchingArrival = (appData.kedatangan || []).filter(k => k && k[1] === name).map(k => { const dDatangStr = k[2] ? k[2].toString().replace(/1899-12-30T/g, '').replace(/T/g, ' ').replace(/\.000Z/g, '') : ""; return { ...k, realDate: getLocalObj(dDatangStr + " " + (k[3] || "00:00")) }; }).filter(k => !isNaN(k.realDate) && k.realDate >= dKeluar).sort((a, b) => a.realDate - b.realDate)[0];
        let isReturn = r[8] === 'Kembali' || !!matchingArrival;
        let arrivalDateDisplay = matchingArrival ? (matchingArrival[2] + " " + matchingArrival[3]) : (r[10] || "-");
        let lateDays = matchingArrival ? Number(matchingArrival[5]) : (Number(r[11]) || 0);
        const statusText = !isReturn ? "Belum Kembali" : (lateDays > 0 ? `Terlambat ${lateDays} Hari` : "Tepat Waktu");
        const statusColorClass = !isReturn ? "text-amber-600 bg-amber-50" : (lateDays > 0 ? "text-red-600 bg-red-50 font-bold" : "text-emerald-600 bg-emerald-50");
        const hasFile = r[9] && r[9].length > 50;

        html += `<div class="bg-white p-5 rounded-2xl border text-xs relative shadow-sm">
            <div class="flex justify-between items-start mb-3">
                <div class="flex flex-wrap items-center gap-2">
                    <span class="px-2 py-1 rounded bg-blue-100 text-blue-700 font-bold uppercase tracking-wider">${r[3]}</span>
                    ${hasFile ? `<button onclick="viewFile('${r[9]}')" class="text-blue-500 font-bold hover:underline flex items-center gap-1 active:scale-95"><i data-lucide="file-text" class="w-3 h-3"></i> Tinjau Berkas</button>` : ""}
                </div>
                ${isAdmin ? `<button onclick="deletePermissionRecord('${r[0]}', '${name.replace(/'/g, "\\'")}')" class="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded-md transition-all flex items-center gap-1" title="Hapus Riwayat Ini"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100"><p class="text-[9px] opacity-60 uppercase font-bold text-slate-400">Waktu Keluar</p><p class="font-medium text-slate-700">${formatOfficialDate(r[5])}</p></div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100"><p class="text-[9px] opacity-60 uppercase font-bold text-blue-500">Estimasi Kedatangan</p><p class="font-medium text-slate-700">${formatOfficialDate(r[6])}</p></div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 sm:col-span-2"><p class="text-[9px] opacity-60 uppercase font-bold text-slate-400">Kedatangan Asli</p><p class="font-medium text-slate-700">${isReturn && arrivalDateDisplay !== "-" ? formatOfficialDate(arrivalDateDisplay) : '<span class="text-amber-600 italic">Belum Melapor...</span>'}</p></div>
                <div class="col-span-full border-t pt-3 flex flex-col sm:flex-row justify-between items-center gap-3">
                    <div class="flex-1 w-full"><p class="text-[9px] opacity-60 uppercase font-bold text-slate-400">Alasan</p><p class="text-slate-800 font-bold">${r[4]}</p></div>
                    <div class="flex-1 w-full"><p class="text-[9px] opacity-60 uppercase font-bold text-slate-400">Penjemput</p><p class="text-slate-800 font-bold">${r[12] || "-"}</p></div>
                    <div class="px-4 py-1.5 rounded-lg border ${statusColorClass} text-center min-w-[150px] transition-all"><p class="text-[8px] opacity-70 uppercase font-bold">Status</p><p class="font-bold uppercase tracking-tight text-[10px]">${statusText}</p></div>
                </div>
            </div>
        </div>`;
    });
    body.innerHTML = html + "</div>" || '<p class="text-center py-10 text-slate-400 italic">Belum ada riwayat perizinan</p>';
    document.getElementById('modal-footer').innerHTML = `
        <div class="flex gap-2 w-full justify-end flex-wrap">
            <button onclick="shareWAIzin('${name.replace(/'/g, "\\'")}')" class="bg-emerald-600 text-white px-4 py-2.5 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-emerald-700 transition-all active:scale-95 shadow-md uppercase"><i data-lucide="message-circle" class="w-4 h-4"></i> KIRIM WA</button>

            <button onclick="closeModal()" class="px-4 py-2.5 border rounded-xl text-xs font-bold hover:bg-slate-50 transition-all">TUTUP</button>
        </div>
    `;
    modal.style.display = 'flex'; initLucide();
}

async function deletePermissionRecord(id, name) {
    if(!confirm("Yakin ingin menghapus riwayat izin ini? Tindakan ini tidak dapat dibatalkan dan akan dihapus permanen dari database.")) return;
    
    appData.riwayat = appData.riwayat.filter(r => r[0] !== id);
    saveCacheSafe();
    
    showToast('Berhasil dihapus', 'success');
    renderDashboard();
    openStudentDetail(name);
    
    if(!IS_PREVIEW) {
        callGAS('deletePermission', { id }).then(() => fetchData(true)).catch(e => showToast('Gagal update server', 'error'));
    }
}

function filterList(id, val) { const labels = document.querySelectorAll(`#${id} label`); labels.forEach(l => l.style.display = l.innerText.toLowerCase().includes(val.toLowerCase()) ? 'flex' : 'none'); }
function handleSyaratChange(val) { const container = document.getElementById('upload-container'); if(!container) return; container.classList.toggle('hidden', val === 'Koordinator'); }

function toggleSelectAll(name) { 
    const cbs = document.querySelectorAll(`input[name="${name}"]:not(:disabled)`); 
    const allChecked = Array.from(cbs).every(c => c.checked); 
    cbs.forEach(c => c.checked = !allChecked); 
    if(name === 'd-santri') updateEstimationDisplay(); 
}

async function submitPermissionMass() {
    const sn = Array.from(document.querySelectorAll('input[name="m-santri"]:checked:not(:disabled)')).map(c => c.value);
    const data = { tipe: document.getElementById('f-tipe').value, syarat: document.getElementById('f-syarat').value, keterangan: document.getElementById('f-keterangan').value, penjemput: document.getElementById('f-penjemput').value, tglKeluar: document.getElementById('f-tgl-keluar').value, jamKeluar: document.getElementById('f-jam-keluar').value, estimasi: document.getElementById('f-estimasi').value };
    if(!sn.length || !data.estimasi) return showToast('Pilih santri yang valid & isi estimasi!', 'error');
    
    // Perbaikan: File sekarang OPSIONAL. Jika kosong, tidak akan return error.
    const fileInput = document.getElementById('f-file');
    
    let alreadyOut = [];
    sn.forEach(n => {
        const record = (appData.riwayat || []).filter(r => r && r[1] === n).sort((a,b) => getLocalObj(b[5]).getTime() - getLocalObj(a[5]).getTime())[0];
        if(record && record[8] === 'Keluar') alreadyOut.push(n);
    });
    if(alreadyOut.length > 0) return showToast(`Gagal! ${alreadyOut.join(', ')} terdeteksi sedang di luar pondok.`, 'error');

    showLoading();
    const sendData = (base64 = "") => {
        // OPTIMISTIC LOCAL UPDATE
        sn.forEach(n => { 
            const s = (appData.santri || []).find(st => st && st[1] == n) || [];
            (appData.riwayat || []).push(["PRZ-TEMP", n, s[2]||"-", data.tipe, data.keterangan, data.tglKeluar+" "+data.jamKeluar, data.estimasi, data.syarat, 'Keluar', base64, "", 0, data.penjemput]); 
        });
        saveCacheSafe();
        
        hideLoading(); showToast('Izin tersimpan!', 'success'); switchPage('dashboard');

        // BACKGROUND SYNC
        if(!IS_PREVIEW) { 
            const promises = sn.map(n => {
                const s = (appData.santri || []).find(st => st && st[1] == n) || []; 
                return callGAS('savePermission', {...data, nama: n, asrama: s[2]||"-", file_data: base64});
            });
            Promise.all(promises).then(() => fetchData(true)).catch(e => console.warn(e));
        }
    };

    if(fileInput && fileInput.files.length) { 
        try {
            const compressedBase64 = await compressImage(fileInput.files[0]);
            sendData(compressedBase64);
        } catch (error) {
            hideLoading();
            showToast('Gagal memproses gambar.', 'error');
        }
    } else {
        sendData("");
    }
}

function updateEstimationDisplay() {
    const checked = Array.from(document.querySelectorAll('input[name="d-santri"]:checked'));
    const container = document.getElementById('est-info-container');
    const display = document.getElementById('estimasi-display');
    if(checked.length > 0) {
        let html = '';
        checked.forEach(cb => {
            const name = cb.value;
            const record = (appData.riwayat || [])
                .filter(r => r && r[1] === name && r[8] === 'Keluar' && (kedatanganFilterTipe === 'Semua' || r[3] === kedatanganFilterTipe))
                .sort((a,b) => getLocalObj(b[5]).getTime() - getLocalObj(a[5]).getTime())[0]; 
                
            if(record) { 
                html += `<div class="text-[10px] border-b border-yellow-200/50 pb-1.5 mb-1.5 last:border-0 last:mb-0 last:pb-0 flex flex-col sm:flex-row justify-between gap-1"><span class="font-bold text-slate-700">${name}</span> <span class="text-emerald-700 font-black sm:text-right">${formatOfficialDate(record[6])}</span></div>`;
            }
        });
        if(html !== '') { display.innerHTML = html; container.classList.remove('hidden'); return; }
    }
    container.classList.add('hidden');
}

async function submitArrivalMass() {
    const sn = Array.from(document.querySelectorAll('input[name="d-santri"]:checked')).map(c => c.value);
    const common = { tglDatang: document.getElementById('d-tgl').value, jamDatang: document.getElementById('d-jam').value, pengantar: document.getElementById('d-pengantar').value };
    if(!sn.length || !common.pengantar) return showToast('Pilih santri & pengantar!', 'error');
    
    // OPTIMISTIC LOCAL UPDATE
    sn.forEach(n => {
        const r = (appData.riwayat || []).filter(row => row && row[1] == n && row[8] === 'Keluar').sort((a,b) => getLocalObj(b[5]).getTime() - getLocalObj(a[5]).getTime())[0];
        if(r) {
            const est = getLocalObj(r[6]); const dat = new Date(common.tglDatang + ' ' + common.jamDatang); const diff = dat.getTime() - est.getTime();
            let lateDays = diff > 0 ? Math.ceil(diff / (1000 * 60 * 60 * 24)) : 0;
            r[8] = 'Kembali'; r[11] = lateDays; r[10] = common.tglDatang + ' ' + common.jamDatang;
            if(lateDays > 0) {
                let entry = (appData.infaq || []).find(i => i && i[0] == n); const denda = lateDays * 100000;
                if(!entry) { entry = [n, denda, 0, denda]; appData.infaq.push(entry); } else { entry[1] = Number(entry[1]) + denda; entry[3] = Number(entry[3]) + denda; }
            }
        }
    });
    saveCacheSafe();
    
    showToast('Kedatangan dicatat!', 'success'); 
    switchPage('dashboard');

    if(!IS_PREVIEW) { 
        const promises = sn.map(n => callGAS('saveArrival', { ...common, nama: n }));
        Promise.all(promises).then(() => fetchData(true)).catch(e => console.warn(e));
    }
}

function submitSeizure() {
    const name = document.getElementById('s-nama').value; const item = document.getElementById('s-item').value; const amount = Number(document.getElementById('s-nominal').value); const ketInput = document.getElementById('s-ket').value; const tgl = document.getElementById('s-tgl').value; const penyita = document.getElementById('s-penyita').value;
    if(!name || !item || !amount || !tgl || !penyita) return showToast('Lengkapi semua data sita!', 'error');
    
    const combinedKet = `${ketInput} || ${tgl} || ${penyita}`;
    
    let entry = (appData.infaq || []).find(i => i && i[0] == name); if(!entry) { entry = [name, 0, 0, 0]; appData.infaq.push(entry); }
    entry[1] = Number(entry[1]) + amount; entry[3] = Number(entry[3]) + amount; (appData.sita_logs || []).push(['ST', name, item, amount, combinedKet, new Date().toISOString()]);
    saveCacheSafe();
    
    showToast('Tercatat di Infaq!', 'success'); 
    renderSita();
    
    if(!IS_PREVIEW) { 
        callGAS('saveSeizure', { name, item, amount, ket: combinedKet }).then(() => fetchData(true)).catch(e => console.warn(e)); 
    }
}

    const lowerKeyword = keyword.toLowerCase();
    const cards = document.querySelectorAll('#list-tunggakan .tunggakan-card');
    cards.forEach(card => {
        const nama = card.getAttribute('data-nama').toLowerCase();
        if (nama.includes(lowerKeyword)) { card.style.display = 'flex'; } else { card.style.display = 'none'; }
    });
}

    const totalPenyaluran = pnyList.reduce((a,c)=>a+(Number(c[2]) || 0),0);
    const saldoTazir = totalTazir - totalPenyaluran;

    const tabNavigation = `
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide border-b">

function submitInfaqTazir() {
    const nama = document.getElementById('i-nama').value; const bayar = Number(document.getElementById('i-bayar').value); const metode = document.getElementById('i-metode').value; const keterangan = document.getElementById('i-ket').value; const jenis = document.getElementById('i-jenis').value; const tanggal = document.getElementById('i-tgl').value;
    if(!nama || !bayar || !keterangan) return showToast('Isi form dengan lengkap!', 'error');
    
    // OPTIMISTIC
    const i = (appData.infaq || []).find(it => it && it[0] == nama); 
    if(i) { i[2] = Number(i[2]) + bayar; i[3] = Number(i[3]) - bayar; }
    (appData.pembayaran || []).push(["P-"+Date.now(), nama, bayar, metode, keterangan + " (" + jenis + ")", tanggal]);
    saveCacheSafe();
    
    closeModal(); showToast('Pembayaran dicatat!', 'success'); renderInfaq(); 
    
    if(!IS_PREVIEW) { 
        callGAS('payInfaq', { nama, bayar, metode, keterangan, jenis, tanggal }).then(() => fetchData(true)).catch(e => console.warn(e)); 
    }
}

async function confirmCancelInfaq(name) {
    const amount = Number(document.getElementById('c-amount').value), alasan = document.getElementById('c-alasan').value, fileInput = document.getElementById('c-file');
    if(!amount || !alasan) return showToast('Harap lengkapi alasan!', 'error');
    
    const sendData = (base64 = "") => {
        const daysToReduce = Math.floor(amount / 100000);
        (appData.kedatangan || []).forEach(k => { if(k && k[1] == name && Number(k[5]) > 0) { const red = Math.min(Number(k[5]), daysToReduce); k[5] = Number(k[5]) - red; if(k[6]) k[6] = Number(k[6]) - (red * 100000); } });
        (appData.riwayat || []).forEach(r => { if(r && r[1] == name && (Number(r[11]) || 0) > 0) { const red = Math.min(Number(r[11]), daysToReduce); r[11] = Number(r[11]) - red; } });
        const item = (appData.infaq || []).find(i => i && i[0] == name); 
        if(item) { item[1] = Number(item[1]) - amount; item[3] = Number(item[3]) - amount; }
        (appData.pembatalan || []).push(["C-"+Date.now(), name, amount, alasan, base64, new Date().toISOString(), daysToReduce]);
        saveCacheSafe();

        closeModal(); renderInfaq(); showToast("Berhasil Dibatalkan", 'success');
        
        if(!IS_PREVIEW) { 
            callGAS('cancelInfaq', { name, amount, alasan, file_bukti: base64, days: daysToReduce }).then(() => fetchData(true)).catch(e => console.warn(e)); 
        }
    };

    if(fileInput && fileInput.files.length) { 
        try {
            showLoading();
            const compressed = await compressImage(fileInput.files[0]);
            hideLoading();
            sendData(compressed);
        } catch (error) {
            hideLoading();
            showToast('Gagal memproses gambar', 'error');
        }
    } else {
        sendData("");
    }
}

function submitPenetapanTazir() {
    const name = document.getElementById('pt-nama').value; const jenis = document.getElementById('pt-jenis').value; const amount = Number(document.getElementById('pt-nominal').value); const ketInput = document.getElementById('pt-ket').value; const tgl = document.getElementById('pt-tgl').value; const penetap = document.getElementById('pt-penetap').value;
    if(!name || !jenis || !amount || !tgl || !penetap) return showToast('Lengkapi semua data!', 'error');
    
    const item = `Pelanggaran: ${jenis}`;
    const combinedKet = `${ketInput} || ${tgl} || ${penetap}`;
    
    let entry = (appData.infaq || []).find(i => i && i[0] == name); 
    if(!entry) { entry = [name, 0, 0, 0]; appData.infaq.push(entry); }
    entry[1] = Number(entry[1]) + amount; 
    entry[3] = Number(entry[3]) + amount; 
    (appData.sita_logs || []).push(['ST', name, item, amount, combinedKet, new Date().toISOString()]);
    saveCacheSafe();

    showToast("Ta'zir ditetapkan!", 'success'); renderInfaq();
    if(!IS_PREVIEW) { 
        callGAS('saveSeizure', { name, item, amount, ket: combinedKet }).then(() => fetchData(true)).catch(e => console.warn(e)); 
    }
}

function submitInfaqUmumMasuk() {
    const kategori = document.getElementById('iu-kategori').value;
    const detail = kategori === 'Infaq Kelas' ? document.getElementById('iu-kelas').value : (document.getElementById('iu-munfiq').value.trim() || 'Hamba Allah');
    const nominal = Number(document.getElementById('iu-nominal').value);
    const metode = document.getElementById('iu-metode').value;
    const tanggal = document.getElementById('iu-tgl').value || new Date().toISOString();

    if(!nominal) return showToast('Masukkan nominal uang!', 'error');
    
    appData.infaq_umum_masuk.push(["IUM-"+Date.now(), kategori, detail, nominal, metode, tanggal]); 
    saveCacheSafe();
    
    showToast('Penerimaan dicatat!', 'success'); renderInfaqUmum();
    if(!IS_PREVIEW) { 
        callGAS('saveInfaqUmumMasuk', { kategori, detail, nominal, metode, tanggal }).then(() => fetchData(true)).catch(e => console.warn(e)); 
    }
}

function submitInfaqUmumKeluar() {
    const sumber = document.getElementById('iuk-sumber').value;
    const tujuan = document.getElementById('iuk-tujuan').value.trim();
    const nominal = Number(document.getElementById('iuk-nominal').value);
    const penerima = document.getElementById('iuk-penerima').value.trim();
    const tanggal = document.getElementById('iuk-tgl').value || new Date().toISOString();

    if(!tujuan || !nominal || !penerima) return showToast('Lengkapi data form!', 'error');
    
    appData.infaq_umum_keluar.push(["IUK-"+Date.now(), sumber, tujuan, penerima, nominal, tanggal]); 
    saveCacheSafe();
    
    showToast('Penyaluran dicatat!', 'success'); renderInfaqUmum();
    if(!IS_PREVIEW) { 
        callGAS('saveInfaqUmumKeluar', { sumber, tujuan, penerima, nominal, tanggal }).then(() => fetchData(true)).catch(e => console.warn(e)); 
    }
}

            <p style="font-size: 12px; font-weight: bold; margin-top: 20px; color: #000;">B. Riwayat Penyaluran</p><table class="pdf-table"><thead><tr><th style="width: 5%;">No</th><th style="width: 20%;">Tanggal</th><th style="width: 35%;">Tujuan</th><th style="width: 20%;">Rp</th><th style="width: 20%;">Penerima</th></tr></thead><tbody>${tKeluar || '<tr><td colspan="5" style="text-align:center">Belum ada data</td></tr>'}</tbody><tfoot><tr><td colspan="3" style="text-align:right; font-weight:bold;">TOTAL PENYALURAN</td><td colspan="2" style="font-weight:bold; text-align:right; color: #000;">${totalKeluar.toLocaleString('id-ID')}</td></tr></tfoot></table>
            <div style="margin-top: 20px; padding: 10px; border: 2px dashed #000; text-align: center; color: #000;"><p style="margin:0; font-size: 14px; font-weight: bold;">SISA SALDO INFAQ UMUM: <span style="font-size: 18px; color: #1e40af;">Rp ${saldo.toLocaleString('id-ID')}</span></p></div>
            <div class="pdf-signature-area" style="line-height: 1.5; margin-top: 20px; page-break-inside: avoid; color: #000;"><p style="margin:0">Banjarmasin, ${tglHariIni}</p><p style="margin-top:5px; margin-bottom:0;">Mengetahui,</p><p style="margin:0">Mudir Pondok Pesantren Insan Madani</p><div style="height:60px; margin: 5px 0; display:flex; justify-content: flex-end;"><img src="${getC('Tanda Tangan URL')}" style="height:60px; width:auto;" onerror="this.style.display='none'"></div><p style="margin:0"><b>${getC('Nama Mudir') || 'KH. Ahmad Yasin'}</b></p></div>
        `;
        printLaporanBrowserNative(htmlContent, 'Laporan_Infaq_Umum_' + new Date().getTime());
    } catch(err) { showToast('Gagal mencetak laporan', 'error'); }
}

function shareWAInfaqUmum() {
    try {
        const masuk = (appData.infaq_umum_masuk || []).filter(x => x && x[1] === 'Infaq Umum'); const keluar = (appData.infaq_umum_keluar || []).filter(x => x && x[1] === 'Infaq Umum');
        const totalMasuk = masuk.reduce((a,c) => a + Number(c[3]), 0); const totalKeluar = keluar.reduce((a,c) => a + Number(c[4]), 0); const saldo = totalMasuk - totalKeluar; const tglHariIni = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
        let text = `*LAPORAN INFAQ UMUM*\nPer Tanggal: ${tglHariIni}\n\n*Penerimaan:* Rp ${totalMasuk.toLocaleString('id-ID')}\n*Penyaluran:* Rp ${totalKeluar.toLocaleString('id-ID')}\n*Sisa Saldo:* Rp ${saldo.toLocaleString('id-ID')}\n\n_Sistem Ponpes Insan Madani Banjarmasin_`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    } catch(err) { showToast('Gagal mengirim WA', 'error'); }
}

function cetakKwitansiInfaq(id) {
    const p = (appData.infaq_umum_masuk || []).find(x => x && x[0] === id);
    if(!p) return showToast('Data tidak ditemukan', 'error');
    const htmlContent = getKwitansiHTML(p[0], p[2], p[3], `Pembayaran ${p[1]}`, p[4], p[5]);
    printLaporanBrowserNative(htmlContent, `Kwitansi_Infaq_${p[0]}`);
}

function submitQurbanPeserta() {
    const nama = document.getElementById('q-nama-baru').value.trim(); const tipe = document.getElementById('q-tipe').value; const target = Number(document.getElementById('q-target').value);
    if(!nama || !tipe || !target) return showToast('Lengkapi data pendaftaran!', 'error');
    
    appData.qurban_master.push(["QUR-"+Date.now(), nama, tipe, target, 0, 'Belum Lunas', new Date().toISOString()]); 
    saveCacheSafe();
    
    showToast('Peserta didaftarkan!', 'success'); renderInfaqUmum();
    if(!IS_PREVIEW) { 
        callGAS('saveQurbanPeserta', { nama, tipe, target }).then(() => fetchData(true)).catch(e => console.warn(e)); 
    }
}

function submitQurbanSetoran() {
    const nama = document.getElementById('qs-nama').value; const nominal = Number(document.getElementById('qs-nominal').value); const metode = document.getElementById('qs-metode').value; const tanggal = document.getElementById('qs-tgl').value || new Date().toISOString();
    if(!nama || !nominal) return showToast('Pilih nama & isi setoran!', 'error');
    
    appData.qurban_log.push(["SQ-"+Date.now(), nama, nominal, metode, tanggal]);
    let qm = appData.qurban_master.find(x => x[1] === nama); if(qm) { qm[4] = Number(qm[4]) + nominal; if(qm[4] >= Number(qm[3])) qm[5] = 'Lunas'; }
    saveCacheSafe();
    
    showToast('Setoran dicatat!', 'success'); renderInfaqUmum();
    if(!IS_PREVIEW) { 
        callGAS('saveQurbanSetoran', { nama, nominal, metode, tanggal }).then(() => fetchData(true)).catch(e => console.warn(e)); 
    }
}

function cetakLaporanQurbanNative() {
    try {
        const qMaster = (appData.qurban_master || []).filter(x => x && x[0] !== "" && x[0] !== null);
        const tglHariIni = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
        let tableRows = qMaster.map((p, i) => {
            const sisa = Number(p[3]) - Number(p[4]); const sisaReal = sisa < 0 ? 0 : sisa;
            return `<tr><td style="text-align:center">${i+1}</td><td>${p[1]}</td><td>${p[2]}</td><td style="text-align:right">${Number(p[3]).toLocaleString('id-ID')}</td><td style="text-align:right; color:green;">${Number(p[4]).toLocaleString('id-ID')}</td><td style="text-align:right; color:red;">${sisaReal.toLocaleString('id-ID')}</td><td style="text-align:center; font-weight:bold;">${p[5]}</td></tr>`;
        }).join('');
        const getC = (k) => (appData.config_pesantren || []).find(x => x && x[0] === k)?.[1] || '-';
        
        const htmlContent = `
            <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 4px double #000; padding-bottom: 10px; margin-bottom: 20px; line-height: 1.5;"><img src="${getC('Logo URL')}" style="width: 100px; height: 100px; object-fit: contain; flex-shrink: 0;" onerror="this.style.opacity='0'"><div style="flex: 1; text-align: center; padding: 0 15px;"><h2 style="margin:0; font-size: 16px; color: #000; font-weight: bold; text-transform: uppercase;">${getC('Nama Lembaga')}</h2><p style="margin:0; font-size: 12px; color: #000;">${getC('Alamat')}</p><p style="margin:0; font-size: 12px; color: #000; font-weight:bold;">Tahun Ajaran: ${getC('Tahun Ajaran')}</p></div><div style="width: 100px; flex-shrink: 0;"></div></div>
            <h3 style="text-align:center; text-decoration: underline; margin-bottom: 20px; font-size: 15px; color: #000;">LAPORAN TABUNGAN QURBAN SANTRI</h3>
            <p style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">Per Tanggal: ${tglHariIni}</p>
            <table class="pdf-table"><thead><tr><th style="width: 5%;">No</th><th style="width: 25%;">Nama Shohibul Qurban</th><th style="width: 15%;">Tipe</th><th style="width: 15%;">Target (Rp)</th><th style="width: 15%;">Terkumpul (Rp)</th><th style="width: 15%;">Sisa (Rp)</th><th style="width: 10%;">Status</th></tr></thead><tbody>${tableRows || '<tr><td colspan="7" style="text-align:center">Belum ada data pendaftar</td></tr>'}</tbody></table>
            <div class="pdf-signature-area" style="line-height: 1.5; margin-top: 20px; page-break-inside: avoid; color: #000;"><p style="margin:0">Banjarmasin, ${tglHariIni}</p><p style="margin-top:5px; margin-bottom:0;">Mengetahui,</p><p style="margin:0">Mudir Pondok Pesantren Insan Madani</p><div style="height:60px; margin: 5px 0; display:flex; justify-content: flex-end;"><img src="${getC('Tanda Tangan URL')}" style="height:60px; width:auto;" onerror="this.style.display='none'"></div><p style="margin:0"><b>${getC('Nama Mudir') || 'KH. Ahmad Yasin'}</b></p></div>
        `;
        printLaporanBrowserNative(htmlContent, 'Laporan_Qurban_' + new Date().getTime());
    } catch(err) { console.error(err); showToast('Gagal mencetak laporan qurban', 'error'); }
}
